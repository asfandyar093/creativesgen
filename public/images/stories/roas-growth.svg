<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1e"/>
      <stop offset="100%" style="stop-color:#2d0f40"/>
    </linearGradient>
    <linearGradient id="barBefore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="barAfter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="600" height="220" fill="url(#bg)"/>
  <!-- Title -->
  <text x="300" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.45)" text-anchor="middle">RETURN ON AD SPEND (ROAS)</text>
  <!-- Grid -->
  <line x1="80" y1="170" x2="520" y2="170" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="115" x2="520" y2="115" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="60" x2="520" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Before bar (short, 1.8x out of 5.1 scale ≈ 35% height) -->
  <rect x="160" y="110" width="90" height="60" rx="8" fill="url(#barBefore)"/>
  <text x="205" y="104" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="rgba(255,255,255,0.35)" text-anchor="middle">1.8×</text>
  <text x="205" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)" text-anchor="middle">Before</text>
  <!-- After bar (tall, 5.1x = full height ~110px) -->
  <rect x="350" y="45" width="90" height="125" rx="8" fill="url(#barAfter)"/>
  <text x="395" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#fdba74" text-anchor="middle">5.1×</text>
  <text x="395" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="middle">After 6 weeks</text>
  <!-- ROAS label -->
  <text x="80" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="end">2×</text>
  <text x="80" y="63" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="end">5×</text>
  <!-- Badge -->
  <rect x="215" y="200" width="170" height="16" rx="8" fill="rgba(249,115,22,0.2)"/>
  <text x="300" y="212" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#fdba74" text-anchor="middle">Same budget · Same audience</text>
</svg>
