<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1e"/>
      <stop offset="100%" style="stop-color:#3b0764"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <rect width="600" height="220" fill="url(#bg)"/>
  <!-- Title -->
  <text x="300" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.45)" text-anchor="middle">CLICK-THROUGH RATE (CTR) · META ADS</text>
  <!-- Before bar (horizontal) -->
  <text x="110" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="end">Before</text>
  <rect x="120" y="68" width="400" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
  <!-- 0.9% of 4.6% scale = ~78px wide out of 400 -->
  <rect x="120" y="68" width="78" height="24" rx="12" fill="url(#pill1)"/>
  <text x="210" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="rgba(255,255,255,0.35)">0.9%</text>
  <!-- After bar (horizontal, 4.6% = full 400px) -->
  <text x="110" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="end">After</text>
  <rect x="120" y="116" width="400" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
  <rect x="120" y="116" width="400" height="24" rx="12" fill="url(#pill2)"/>
  <text x="330" y="133" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#fff">4.6%</text>
  <!-- Big stat -->
  <text x="300" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="900" fill="#f9a8d4" text-anchor="middle">5.1× more clicks</text>
  <!-- Badge -->
  <rect x="190" y="190" width="220" height="20" rx="10" fill="rgba(236,72,153,0.15)"/>
  <text x="300" y="204" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#f9a8d4" text-anchor="middle">CPA down 52% · Same budget</text>
</svg>
