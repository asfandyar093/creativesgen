<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16"/>
      <stop offset="100%" style="stop-color:#064e3b"/>
    </linearGradient>
    <linearGradient id="downLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="220" fill="url(#bg)"/>
  <!-- Title -->
  <text x="300" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.45)" text-anchor="middle">BOUNCE RATE — 2 WEEKS</text>
  <!-- Downward trend line (bounce rate going DOWN = good) -->
  <polygon points="60,50 180,60 280,80 380,100 480,110 540,120 540,170 60,170" fill="url(#downLine)"/>
  <polyline points="60,50 180,60 280,80 380,100 480,110 540,120" fill="none" stroke="#10b981" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Dots -->
  <circle cx="60" cy="50" r="6" fill="#10b981" stroke="#052e16" stroke-width="2"/>
  <circle cx="540" cy="120" r="7" fill="#6ee7b7" stroke="#052e16" stroke-width="2"/>
  <!-- Labels -->
  <text x="60" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.4)" text-anchor="middle">Week 0</text>
  <text x="540" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">Week 2</text>
  <!-- X axis -->
  <line x1="60" y1="170" x2="540" y2="170" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Big stat -->
  <text x="300" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="900" fill="rgba(255,255,255,0.06)" text-anchor="middle">↓31%</text>
  <!-- Badge -->
  <rect x="205" y="178" width="190" height="26" rx="13" fill="rgba(16,185,129,0.2)"/>
  <text x="300" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="800" fill="#6ee7b7" text-anchor="middle">Bounce rate down 31% in 2 weeks</text>
  <text x="300" y="214" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">more inbound inquiries · polished look</text>
</svg>
