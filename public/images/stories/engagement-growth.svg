<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#5b5ef4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="220" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <line x1="60" y1="30" x2="60" y2="170" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="60" y1="170" x2="540" y2="170" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="60" y1="110" x2="540" y2="110" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="70" x2="540" y2="70" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Title -->
  <text x="300" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">INSTAGRAM ENGAGEMENT RATE</text>
  <!-- Before bar (short) -->
  <rect x="140" y="152" width="70" height="18" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="155" y="140" width="70" height="30" rx="6" fill="url(#bar1)" opacity="0.5"/>
  <!-- After bar (tall) -->
  <rect x="380" y="45" width="70" height="125" rx="6" fill="url(#bar2)"/>
  <!-- Bar labels -->
  <text x="190" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,0.5)" text-anchor="middle">1.2%</text>
  <text x="415" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="900" fill="#a5b4fc" text-anchor="middle">8.7%</text>
  <!-- X-axis labels -->
  <text x="190" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="middle">Before</text>
  <text x="415" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">After Creatives Gen</text>
  <!-- Arrow -->
  <text x="300" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="rgba(255,255,255,0.3)" text-anchor="middle">→</text>
  <!-- Badge -->
  <rect x="210" y="198" width="180" height="18" rx="9" fill="rgba(129,140,248,0.2)"/>
  <text x="300" y="211" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#a5b4fc" text-anchor="middle">7.2x improvement in 3 weeks</text>
</svg>
