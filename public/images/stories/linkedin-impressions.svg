<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="line-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b5ef4;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#5b5ef4;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="220" fill="url(#bg)"/>
  <!-- Title -->
  <text x="300" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.45)" text-anchor="middle">LINKEDIN IMPRESSIONS — 2 WEEKS</text>
  <!-- Area fill -->
  <polygon points="60,160 110,155 170,148 230,138 280,128 330,108 390,80 450,55 540,38 540,170 60,170" fill="url(#line-fill)"/>
  <!-- Line chart -->
  <polyline points="60,160 110,155 170,148 230,138 280,128 330,108 390,80 450,55 540,38" fill="none" stroke="#818cf8" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Dots on key points -->
  <circle cx="60" cy="160" r="5" fill="#5b5ef4"/>
  <circle cx="540" cy="38" r="7" fill="#a5b4fc" stroke="#1e3a5f" stroke-width="2"/>
  <!-- Labels -->
  <text x="60" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.35)" text-anchor="middle">Week 0</text>
  <text x="540" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#a5b4fc" text-anchor="middle">Week 2</text>
  <!-- Big metric -->
  <text x="300" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="900" fill="rgba(255,255,255,0.08)" text-anchor="middle">3×</text>
  <!-- Center metric badge -->
  <rect x="220" y="178" width="160" height="26" rx="13" fill="rgba(91,94,244,0.25)"/>
  <text x="300" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="800" fill="#a5b4fc" text-anchor="middle">3× more impressions in 2 weeks</text>
  <!-- X axis -->
  <line x1="60" y1="170" x2="540" y2="170" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>
