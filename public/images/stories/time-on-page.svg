<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16"/>
      <stop offset="100%" style="stop-color:#083344"/>
    </linearGradient>
  </defs>
  <rect width="600" height="220" fill="url(#bg)"/>
  <!-- Title -->
  <text x="300" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.45)" text-anchor="middle">CLIENT WEBSITE TIME-ON-PAGE</text>
  <!-- Clock icon area -->
  <circle cx="300" cy="95" r="50" fill="none" stroke="rgba(16,185,129,0.15)" stroke-width="2"/>
  <circle cx="300" cy="95" r="42" fill="rgba(16,185,129,0.08)"/>
  <!-- Clock hands -->
  <line x1="300" y1="95" x2="300" y2="62" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="95" x2="325" y2="108" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <circle cx="300" cy="95" r="4" fill="#6ee7b7"/>
  <!-- Big % -->
  <text x="300" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="900" fill="#10b981" text-anchor="middle">+44%</text>
  <!-- Subtitle -->
  <text x="300" y="56" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">time-on-page</text>
  <!-- Badge -->
  <rect x="190" y="182" width="220" height="24" rx="12" fill="rgba(6,182,212,0.2)"/>
  <text x="300" y="199" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="800" fill="#67e8f9" text-anchor="middle">30+ client sites · proven results</text>
</svg>
